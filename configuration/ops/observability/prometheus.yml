global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: autotext2sql-app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8889"]

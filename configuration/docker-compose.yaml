services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: autotext2sql-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  app:
    image: ${AUTOTEXT2SQL_APP_IMAGE:-autotext2sql:latest}
    container_name: autotext2sql-app
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      AUTOTEXT2SQL_QDRANT_URL: ${AUTOTEXT2SQL_QDRANT_URL:-http://qdrant:6333}
      LLM_GATEWAY_BASE_URL: ${LLM_GATEWAY_BASE_URL}
      LLM_GATEWAY_API_KEY: ${LLM_GATEWAY_API_KEY}
      AUTOTEXT2SQL_DB_PROD_URL: ${AUTOTEXT2SQL_DB_PROD_URL}
      AUTOTEXT2SQL_DB_ANALYTICS_URL: ${AUTOTEXT2SQL_DB_ANALYTICS_URL:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      AUTOTEXT2SQL_LOG_LEVEL: ${AUTOTEXT2SQL_LOG_LEVEL:-INFO}
      AUTOTEXT2SQL_ENABLE_LANGSMITH: ${AUTOTEXT2SQL_ENABLE_LANGSMITH:-false}
    ports:
      - "8000:8000"
    command: >
      sh -c "${AUTOTEXT2SQL_APP_COMMAND:-uvicorn autotext2sql.api:app --host 0.0.0.0 --port 8000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  indexer:
    image: ${AUTOTEXT2SQL_APP_IMAGE:-autotext2sql:latest}
    container_name: autotext2sql-indexer
    profiles:
      - indexing
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      AUTOTEXT2SQL_QDRANT_URL: ${AUTOTEXT2SQL_QDRANT_URL:-http://qdrant:6333}
      LLM_GATEWAY_BASE_URL: ${LLM_GATEWAY_BASE_URL}
      LLM_GATEWAY_API_KEY: ${LLM_GATEWAY_API_KEY}
      AUTOTEXT2SQL_DB_PROD_URL: ${AUTOTEXT2SQL_DB_PROD_URL}
      AUTOTEXT2SQL_DB_ANALYTICS_URL: ${AUTOTEXT2SQL_DB_ANALYTICS_URL:-}
    command: >
      sh -c "${AUTOTEXT2SQL_INDEX_COMMAND:-python -m autotext2sql.index --rebuild}"
    restart: "no"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: autotext2sql-otel-collector
    profiles:
      - observability
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    volumes:
      - ./ops/observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  prometheus:
    image: prom/prometheus:latest
    container_name: autotext2sql-prometheus
    profiles:
      - observability
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./ops/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app
      - otel-collector

  loki:
    image: grafana/loki:latest
    container_name: autotext2sql-loki
    profiles:
      - observability
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./ops/observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:latest
    container_name: autotext2sql-promtail
    profiles:
      - observability
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./ops/observability/promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: autotext2sql-grafana
    profiles:
      - observability
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  qdrant_storage:
  prometheus_data:
  loki_data:
  grafana_data:
